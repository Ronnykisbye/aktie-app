# =========================================================
# AFSNIT 01 – Navn + triggers
# =========================================================
name: Update prices.json (daily)

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch: {}

# =========================================================
# AFSNIT 02 – Permissions
# =========================================================
permissions:
  contents: write

# =========================================================
# AFSNIT 03 – Job
# =========================================================
jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # =========================================================
      # AFSNIT 03A – Checkout
      # =========================================================
      - name: Checkout repo
        uses: actions/checkout@v4

      # =========================================================
      # AFSNIT 03B – Node
      # =========================================================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # =========================================================
      # AFSNIT 03C – Kør script
      # =========================================================
      - name: Fetch prices and update JSON
        run: node scripts/fetch_prices.mjs

      # =========================================================
      # AFSNIT 03D – Vis ændringer
      # =========================================================
      - name: Show git status
        run: |
          git status
          git diff -- data/prices.json || true

      # =========================================================
      # AFSNIT 03E – Commit + push
      # =========================================================
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          git commit -m "Update prices.json $(date +%s)" || echo "No changes to commit"
          git push
